name: 联盟营销 SEO 自动化
description: 自动生成 SEO 友好型联盟营销内容并规划发布策略。
input:
  parameters:
    niche: string
    target_keyword: string
    monetization_model: string
steps:
  - id: keyword_analysis
    name: 关键词研究
    type: prompt
    prompt_id: seo_keyword_analysis
    next: generate_article
    on_error: retry
  - id: generate_article
    name: 生成 SEO 文章
    type: prompt
    prompt_id: seo_article
    next: content_review
    on_error: continue
  - id: content_review
    name: 简要内容审查
    type: condition
    prompt_id: seo_review
    next:
      - publish_plan
      - revise_article
    on_error: abort
  - id: publish_plan
    name: 规划发布和推广
    type: prompt
    prompt_id: seo_publish_plan
    next: output
    on_error: continue
output:
  article: object
  publish_plan: object
kpi:
  - organic_traffic
  - conversion_rate
  - affiliate_revenue
