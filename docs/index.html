<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Awesome Financial Freedom</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <header>
      <h1>Awesome Financial Freedom</h1>
      <p class="lead">
        这是一个开源财务自由执行系统的静态演示。无需服务端，直接在浏览器里试算 FIRE 计划与资产再平衡。
      </p>
    </header>

    <div class="panel">
      <label>选择工作流</label>
      <select id="workflowSelect">
        <option value="fire_planning">FIRE 计划</option>
        <option value="portfolio_rebalancing">组合再平衡</option>
      </select>

      <div id="fireFields" class="form-row">
        <div>
          <label>当前储蓄 (元)</label>
          <input id="currentSavings" type="number" value="200000" />
        </div>
        <div>
          <label>年收入 (元)</label>
          <input id="annualIncome" type="number" value="180000" />
        </div>
        <div>
          <label>年支出 (元)</label>
          <input id="annualExpenses" type="number" value="108000" />
        </div>
        <div>
          <label>年储蓄 (元)</label>
          <input id="annualSavings" type="number" value="72000" />
        </div>
        <div>
          <label>预期年收益率 (%)</label>
          <input id="expectedReturn" type="number" step="0.1" value="7" placeholder="7" />
        </div>
        <div>
          <label>安全提现率 (%)</label>
          <input id="safeWithdrawalRate" type="number" step="0.1" value="4" placeholder="4" />
        </div>
      </div>

      <div id="rebalanceFields" class="form-row hidden">
        <div>
          <label>股票当前价值 (元)</label>
          <input id="stocksValue" type="number" value="700000" />
        </div>
        <div>
          <label>债券当前价值 (元)</label>
          <input id="bondsValue" type="number" value="300000" />
        </div>
        <div>
          <label>股票目标比例 (%)</label>
          <input id="stocksTarget" type="number" value="60" />
        </div>
        <div>
          <label>债券目标比例 (%)</label>
          <input id="bondsTarget" type="number" value="40" />
        </div>
        <div>
          <label>再平衡阈值 (%)</label>
          <input id="threshold" type="number" step="0.01" value="0.05" />
        </div>
      </div>

      <button id="runButton">生成计划</button>

      <div id="summary" class="summary-card hidden"></div>
    </div>

    <div class="panel">
      <h2>GitHub Pages 访问</h2>
      <p>
        将本仓库推到 GitHub 后，启用 Pages 并选择 <code>gh-pages</code> 分支或 <code>/docs</code> 文件夹。
        之后用户就可直接访问类似：
      </p>
      <p><strong>https://&lt;你的用户名&gt;.github.io/awesome-financial-freedom/</strong></p>
      <p>本演示同时适合本地调试和静态站点发布。</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
