name: financial-freedom-advisor

description: |
  Hermes skill agent for awesome-financial-freedom.
  Loads the financial-freedom-advisor skill from ~/.hermes/skills/.

agent_config:
  type: hermes
  skill: financial-freedom-advisor

capabilities:
  - fire_assessment
  - dca_planning
  - portfolio_rebalancing

usage: |
  hermes -s financial-freedom-advisor

  Skill file: ~/.hermes/skills/financial-freedom-advisor/SKILL.md
  System prompt: prompts/system.md
