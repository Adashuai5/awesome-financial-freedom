<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="960" height="360" fill="url(#bg)" rx="24"/>
  <rect x="24" y="24" width="912" height="312" rx="20" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="48" y="64" fill="#f8fafc" font-family="Inter,ui-sans-serif,sans-serif" font-size="24" font-weight="700">AI 对话演示：退休规划与组合再平衡</text>
  <rect x="48" y="92" width="400" height="92" rx="14" fill="#1e293b"/>
  <text x="64" y="124" fill="#cbd5e1" font-family="Inter,ui-sans-serif,sans-serif" font-size="16">用户：</text>
  <text x="64" y="148" fill="#e2e8f0" font-family="Inter,ui-sans-serif,sans-serif" font-size="16">我每月收入 5000，美金，存 1000，何时可以退休？</text>
  <rect x="48" y="204" width="400" height="112" rx="14" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="64" y="236" fill="#7dd3fc" font-family="Inter,ui-sans-serif,sans-serif" font-size="16">AI：</text>
  <text x="64" y="260" fill="#e2e8f0" font-family="Inter,ui-sans-serif,sans-serif" font-size="16">估算 FIRE 目标：约 120 万美元；</text>
  <text x="64" y="284" fill="#e2e8f0" font-family="Inter,ui-sans-serif,sans-serif" font-size="16">预计 20 年后达到，建议：提高储蓄率、优化资产配置。</text>
  <rect x="472" y="92" width="424" height="224" rx="18" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="496" y="124" fill="#7dd3fc" font-family="Inter,ui-sans-serif,sans-serif" font-size="16">本地验证命令</text>
  <text x="496" y="156" fill="#e2e8f0" font-family="Inter,ui-sans-serif,sans-serif" font-size="16">npm run run:workflow workflows/fire_planning.yaml</text>
  <text x="496" y="182" fill="#e2e8f0" font-family="Inter,ui-sans-serif,sans-serif" font-size="16">npm run run:workflow workflows/portfolio_rebalancing.yaml</text>
  <text x="496" y="216" fill="#cbd5e1" font-family="Inter,ui-sans-serif,sans-serif" font-size="14">本截图展示了仓库内 AI 工作流执行结果</text>
</svg>
