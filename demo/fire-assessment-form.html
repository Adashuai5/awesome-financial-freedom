<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIRE 财务自由评估 - Awesome Financial Freedom</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .fire-form {
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form-title {
      color: #333;
      font-size: 28px;
      margin-bottom: 10px;
      text-align: center;
    }

    .form-description {
      color: #666;
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .form-section {
      margin-bottom: 30px;
      border: none;
      border-top: 2px solid #f0f0f0;
      padding-top: 20px;
    }

    .form-section:first-of-type {
      border-top: none;
      padding-top: 0;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin-bottom: 20px;
      padding: 0;
    }

    .section-fields {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .field-label {
      font-weight: 500;
      color: #333;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .required {
      color: #e74c3c;
      margin-left: 4px;
    }

    .tooltip-icon {
      display: inline-block;
      width: 18px;
      height: 18px;
      background: #3498db;
      color: white;
      border-radius: 50%;
      text-align: center;
      line-height: 18px;
      font-size: 12px;
      cursor: help;
      margin-left: 6px;
      font-weight: bold;
    }

    .input-group {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-prefix,
    .input-suffix {
      position: absolute;
      color: #999;
      font-weight: 500;
      padding: 0 10px;
    }

    .input-prefix {
      left: 0;
    }

    .input-suffix {
      right: 0;
    }

    .currency-input {
      padding-left: 30px !important;
    }

    .percentage-input {
      padding-right: 30px !important;
    }

    .form-control {
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      transition: all 0.3s ease;
      width: 100%;
      font-family: inherit;
    }

    .form-control:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      background-color: #f8f9ff;
    }

    .form-control::placeholder {
      color: #bbb;
    }

    .form-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 40px;
      padding-top: 20px;
      border-top: 2px solid #f0f0f0;
    }

    .btn-primary,
    .btn-secondary {
      padding: 12px 30px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .error-alert {
      background: #fee;
      border-left: 4px solid #e74c3c;
      color: #c0392b;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
    }

    .error-alert h3 {
      margin-bottom: 10px;
      font-size: 14px;
    }

    .error-alert ul {
      list-style: none;
      padding-left: 0;
    }

    .error-alert li {
      margin-bottom: 5px;
      font-size: 13px;
    }

    .error-alert li:before {
      content: '✗ ';
      margin-right: 6px;
    }

    .success-message {
      background: #d4edda;
      border-left: 4px solid #28a745;
      color: #155724;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
    }

    .result-panel {
      margin-top: 24px;
      padding: 20px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: #f8fafc;
    }

    .result-panel h2 {
      margin-bottom: 12px;
      font-size: 20px;
      color: #111827;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .kpi-item {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
    }

    .kpi-label {
      color: #6b7280;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .kpi-value {
      font-size: 18px;
      font-weight: 700;
      color: #111827;
    }

    .result-actions-list {
      margin: 10px 0 0 18px;
      color: #1f2937;
    }

    .result-actions-list li {
      margin-bottom: 6px;
    }

    @media (max-width: 768px) {
      .container {
        padding: 20px;
      }

      .form-title {
        font-size: 22px;
      }

      .section-fields {
        grid-template-columns: 1fr;
      }

      .form-actions {
        flex-direction: column;
      }

      .btn-primary,
      .btn-secondary {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div id="form-container"></div>
    <div id="result-panel" class="result-panel" style="display:none;"></div>
  </div>

  <!-- Load form components -->
  <script src="form-components.js"></script>

  <script>
    function formatMoney(value) {
      return `${Math.round(value).toLocaleString('zh-CN')} 元`;
    }

    function getEmergencyMonths(status) {
      if (status === 'with_dependents') return 12;
      if (status === 'married') return 9;
      return 6;
    }

    function getRiskLabel(riskTolerance) {
      if (riskTolerance === 'high') return '高风险偏好';
      if (riskTolerance === 'low') return '低风险偏好';
      return '中风险偏好';
    }

    function buildAssessment(data) {
      const netAssets = data.total_assets - data.total_liabilities;
      const monthlyExpenses = data.annual_fixed_expenses / 12;
      const emergencyMonths = getEmergencyMonths(data.family_status);
      const emergencyFundTarget = monthlyExpenses * emergencyMonths;
      const annualPassiveIncome = data.monthly_passive_income * 12;
      const fireTarget = Math.max(0, (data.annual_fixed_expenses - annualPassiveIncome) / 0.04);
      const investableAssets = Math.max(0, netAssets - data.primary_residence_value);
      const annualGrowth = investableAssets * data.expected_return_rate + data.annual_savings;
      const gap = Math.max(0, fireTarget - investableAssets);
      const yearsToFI = annualGrowth > 0 ? Math.ceil(gap / annualGrowth) : null;

      const actions = [];
      if (data.annual_savings < data.annual_fixed_expenses * 0.2) {
        actions.push('优先把年储蓄率提升到 20% 以上（降支出或提收入）。');
      }
      if (emergencyFundTarget > 0 && data.total_assets < emergencyFundTarget) {
        actions.push(`先补足应急金到 ${formatMoney(emergencyFundTarget)}，再加大权益投资。`);
      }
      if (data.monthly_mortgage_payment > data.annual_fixed_expenses / 12 * 0.4) {
        actions.push('房贷占比偏高，优先做再融资评估或提前还款测算。');
      }
      if (!actions.length) {
        actions.push('当前结构健康，按季度复盘资产、储蓄率与目标年限。');
      }

      return {
        netAssets,
        emergencyFundTarget,
        fireTarget,
        investableAssets,
        yearsToFI,
        annualGrowth,
        actions,
      };
    }

    function renderAssessment(data, assessment) {
      const panel = document.getElementById('result-panel');
      const yearsText = assessment.yearsToFI === null ? '暂无法估算' : `${assessment.yearsToFI} 年`;
      const riskLabel = getRiskLabel(data.risk_tolerance);
      panel.innerHTML = `
        <h2>FIRE 评估结果</h2>
        <div class="kpi-grid">
          <div class="kpi-item">
            <div class="kpi-label">净资产</div>
            <div class="kpi-value">${formatMoney(assessment.netAssets)}</div>
          </div>
          <div class="kpi-item">
            <div class="kpi-label">可投资资产</div>
            <div class="kpi-value">${formatMoney(assessment.investableAssets)}</div>
          </div>
          <div class="kpi-item">
            <div class="kpi-label">FIRE 目标资产</div>
            <div class="kpi-value">${formatMoney(assessment.fireTarget)}</div>
          </div>
          <div class="kpi-item">
            <div class="kpi-label">预计达成年限</div>
            <div class="kpi-value">${yearsText}</div>
          </div>
        </div>
        <p><strong>应急金建议：</strong>${formatMoney(assessment.emergencyFundTarget)}（按 ${getEmergencyMonths(data.family_status)} 个月支出）</p>
        <p><strong>风险偏好：</strong>${riskLabel}，当前预期年化 ${(data.expected_return_rate * 100).toFixed(1)}%</p>
        <p><strong>年复利推进额（估算）：</strong>${formatMoney(assessment.annualGrowth)}</p>
        <h3 style="margin-top:14px;">下一步行动建议</h3>
        <ol class="result-actions-list">
          ${assessment.actions.map((item) => `<li>${item}</li>`).join('')}
        </ol>
      `;
      panel.style.display = 'block';
      panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // Initialize form when DOM is ready
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        // Load form schema
        const response = await fetch('form-schema.json');
        const schema = await response.json();

        // Create form manager
        const manager = new FormManager(
          schema.fire_assessment_form,
          schema.validation_rules,
          schema.field_types
        );

        // Initialize form with event handler
        manager.initialize(
          'form-container',
          'fire_assessment',
          async (formData) => {
            const assessment = buildAssessment(formData);
            renderAssessment(formData, assessment);
          }
        );
      } catch (error) {
        console.error('Failed to initialize form:', error);
        showError('表单加载失败，请稍后重试');
      }
    });

    function showError (message) {
      const panel = document.getElementById('result-panel');
      panel.innerHTML = `<div class="error-alert"><h3>错误</h3><ul><li>${message}</li></ul></div>`;
      panel.style.display = 'block';
    }
  </script>
</body>

</html>
